services:
  waha:
    image: devlikeapro/waha:latest
    container_name: auto-checker-waha
    restart: unless-stopped
    environment:
      WAHA_SESSION: default
      WAHA_SESSION_AUTO_START: "true"
    volumes:
      - waha_data:/app/.wahaSessions
    ports:
      - "3001:3000"

volumes:
  waha_data:
